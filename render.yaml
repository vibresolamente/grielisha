databases:
  - name: grielisha-db
    databaseName: grielisha
    user: grielisha_user
    plan: free

services:
  - type: web
    name: grielisha-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn grielisha.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: grielisha-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: CORS_ALLOWED_ORIGINS
        value: "https://grielisha.vercel.app,https://grielisha-digital.vercel.app"
